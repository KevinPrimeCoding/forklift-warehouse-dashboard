services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
        NEXT_PUBLIC_WS_BASE: ws://localhost:8000/ws/events
    ports:
      - "3000:3000"
    depends_on:
      - backend
